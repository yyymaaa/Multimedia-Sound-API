<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Sound System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blur"></div>
    <div class="player-container">
        <div class="art-container">
            <img id="track-art" src="https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?q=80&w=600" alt="Alien Cover Art" class="track-art">
            <div class="center-hole"></div>
        </div>

        <div class="track-info">
            <h1>Sound Helix</h1>
            <p>Interstellar DJ</p>
        </div>

        <audio id="audio-element" preload="metadata">
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>

        <div class="progress-container">
            <input type="range" id="progress-bar" value="0" max="100">
            <div class="time-meta">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="main-controls">
            <button id="loop-btn" class="secondary-btn"><i class="fas fa-repeat"></i></button>
            <button id="skip-back" class="secondary-btn"><i class="fas fa-backward-step"></i></button>
            <button id="play-btn" class="play-trigger"><i class="fas fa-play" id="play-icon"></i></button>
            <button id="skip-forward" class="secondary-btn"><i class="fas fa-forward-step"></i></button>
            <button id="mute-btn" class="secondary-btn"><i class="fas fa-volume-up" id="mute-icon"></i></button>
        </div>

        <div class="volume-container">
            <i class="fas fa-volume-off"></i>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7">
            <i class="fas fa-volume-high"></i>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
